# =========================
# Prefix
# =========================
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Clear pane like Ctrl+l
bind C-l send-keys C-l

# Split windows with current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# =========================
# Mode & Mouse
# =========================
set -g mode-keys vi
set -g mouse on

# Mouse scroll: forward to mouse-aware programs (nvim, less, man),
# otherwise enter copy-mode for scrollback
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "select-pane -t=; send-keys -M"

# =========================
# Copy-mode improvements
# =========================
# Faster scrolling
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi C-b send -X page-up
bind -T copy-mode-vi C-f send -X page-down

# Vi-style selection & copy
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel \; run-shell "tmux save-buffer - | clip.exe"

# Copy entire buffer manually
bind-key C-c run-shell "tmux save-buffer - | clip.exe"

# =========================
# Pane navigation & resizing
# =========================
# Resize panes with arrow keys
bind -r C-Left  resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up    resize-pane -U 5
bind -r C-Down  resize-pane -D 5

# =========================
# Status line
# =========================
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[fg=green]#S #[fg=yellow]| #[fg=cyan]%Y-%m-%d %H:%M"
set -g status-right "#[fg=blue]#(whoami)@#H #[fg=magenta]| #(git rev-parse --abbrev-ref HEAD 2>/dev/null)"
set -g status-bg colour234
set -g status-fg colour136

# =========================
# Config reload
# =========================
bind r source-file ~/.tmux.conf

# =========================
# Plugins (TPM)
# =========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sidebar'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha' # latte, frappe, macchiato, mocha

run '~/.tmux/plugins/tpm/tpm'
